version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:////app/fraud_detection.db
      - SECRET_KEY=docker-local-secret
      - JWT_SECRET_KEY=docker-jwt-secret
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./models:/app/models     # Mount trained models
      - ./results:/app/results   # Mount result images
    restart: unless-stopped
