services:
  - type: web
    name: fraudguard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.app:app --config gunicorn.conf.py
    envVars:
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
